<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - OneAuth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/user/auth.css">
</head>
<body class="bg-[#0a0a0a] text-[#f8fafc] min-h-screen flex items-center justify-center font-roboto">
    
    <div class="w-full max-w-[520px] bg-[#0a0a0a] border border-[#262626] rounded-lg p-8 sm:p-12 mx-4 shadow-xl">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-google-sans mb-2">Sign in</h1>
            <p class="text-base text-[#f8fafc]">Use your OneAuth Account</p>
        </div>

        <div id="account-not-found-msg" class="hidden mb-6 p-4 bg-red-950/40 border border-red-500/50 rounded-lg text-center">
            <p class="text-red-300 text-sm font-medium mb-3">Account not found.</p>
            <a id="signup-link-inline" href="/user/signup" class="text-white bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-xs font-medium inline-block transition-colors">Create an account</a>
        </div>

        <form id="loginForm" class="space-y-8">
            
            <div class="space-y-6">
                <div class="input-group">
                    <input type="email" id="email" required autocomplete="email" class="google-input" placeholder=" ">
                    <label for="email">Email or phone</label>
                    <p id="error-email" class="error-text hidden">Enter a valid email address</p>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required autocomplete="current-password" class="google-input" placeholder=" ">
                    <label for="password">Enter your password</label>
                    <p id="error-password" class="error-text hidden">Enter your password</p>
                </div>
            </div>

            <div class="flex flex-col space-y-6">
                <a href="/user/forgot-password" class="text-[#2dd4bf] text-sm font-medium hover:underline w-fit">Forgot password?</a>

                
                <div class="flex justify-between items-center pt-4">
                    <a href="/user/signup" class="text-[#2dd4bf] font-medium hover:bg-[#262626] px-4 py-2 rounded transition-colors">Create account</a>
                    <button type="button" onclick="submitLogin()" class="google-btn-primary">Next</button>
                </div>
            </div>

        </form>

        <div class="mt-12 flex justify-between text-xs text-[#94a3b8]">
            <span>English (United States)</span>
            <div class="space-x-4">
                <a href="#" class="hover:text-[#f8fafc]">Help</a>
                <a href="#" class="hover:text-[#f8fafc]">Privacy</a>
                <a href="#" class="hover:text-[#f8fafc]">Terms</a>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const redirectUriParam = params.get('redirect_uri') || params.get('return_to');
            if (redirectUriParam) {
                const encodedUri = encodeURIComponent(redirectUriParam);
                const forgotLink = document.querySelector('a[href^="/user/forgot-password"]');
                const signupLink = document.querySelector('a[href^="/user/signup"]');
                const signupInlineLink = document.getElementById('signup-link-inline');
                if (forgotLink) forgotLink.href = `/user/forgot-password?redirect_uri=${encodedUri}`;
                if (signupLink) signupLink.href = `/user/signup?redirect_uri=${encodedUri}`;
                if (signupInlineLink) signupInlineLink.href = `/user/signup?redirect_uri=${encodedUri}`;
            }
        });

        async function submitLogin() {
            const email = document.getElementById('email');
            const pass = document.getElementById('password');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let isValid = true;

            if (!emailRegex.test(email.value.trim())) {
                showError(email, 'error-email');
                isValid = false;
            } else hideError(email, 'error-email');

            if (!pass.value.trim()) {
                showError(pass, 'error-password');
                isValid = false;
            } else hideError(pass, 'error-password');

            if (isValid) {
                const loginData = {
                    email: email.value.trim(),
                    password: pass.value
                };


                try {
                    // Capture redirect_uri from the current page URL
                    const params = new URLSearchParams(window.location.search);
                    const redirectUriParam = params.get('redirect_uri') || params.get('return_to');
                    const fetchUrl = redirectUriParam ? `/user/login?redirect_uri=${encodeURIComponent(redirectUriParam)}` : '/user/login';

                    const response = await fetch(fetchUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(loginData)
                    });

                    const result = await response.json();

                    if (response.ok) {
                        // Redirect to redirectUri if provided, otherwise to a default (e.g., dashboard)
                        window.location.href = result.data.redirectUri || '/user/profile';
                    } else {
                        document.getElementById('account-not-found-msg').classList.remove('hidden');
                    }
                } catch (err) {
                    document.getElementById('account-not-found-msg').classList.remove('hidden');
                }

            }

        }

        function showError(input, errorId) {
            input.classList.add('error');
            document.getElementById(errorId).classList.remove('hidden');
        }

        function hideError(input, errorId) {
            input.classList.remove('error');
            document.getElementById(errorId).classList.add('hidden');
        }
    </script>
</body>
</html>
