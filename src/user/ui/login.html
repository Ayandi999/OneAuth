<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - OneAuth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/user/auth.css">
</head>
<body class="bg-[#202124] text-[#e8eaed] min-h-screen flex items-center justify-center font-roboto">
    
    <div class="w-full max-w-[520px] bg-[#202124] border border-[#3c4043] rounded-lg p-8 sm:p-12 mx-4 shadow-xl">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-google-sans mb-2">Sign in</h1>
            <p class="text-base text-[#e8eaed]">Use your OneAuth Account</p>
        </div>

        <form id="loginForm" class="space-y-8">
            
            <div class="space-y-6">
                <div class="input-group">
                    <input type="email" id="email" required autocomplete="email" class="google-input" placeholder=" ">
                    <label for="email">Email or phone</label>
                    <p id="error-email" class="error-text hidden">Enter a valid email address</p>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required autocomplete="current-password" class="google-input" placeholder=" ">
                    <label for="password">Enter your password</label>
                    <p id="error-password" class="error-text hidden">Enter your password</p>
                </div>
            </div>

            <div class="flex flex-col space-y-6">
                <a href="/user/forgot-password" class="text-[#8ab4f8] text-sm font-medium hover:underline w-fit">Forgot password?</a>

                
                <div class="flex justify-between items-center pt-4">
                    <a href="/user/signup" class="text-[#8ab4f8] font-medium hover:bg-[#303134] px-4 py-2 rounded transition-colors">Create account</a>
                    <button type="button" onclick="submitLogin()" class="google-btn-primary">Next</button>
                </div>
            </div>

        </form>

        <div class="mt-12 flex justify-between text-xs text-[#9aa0a6]">
            <span>English (United States)</span>
            <div class="space-x-4">
                <a href="#" class="hover:text-[#e8eaed]">Help</a>
                <a href="#" class="hover:text-[#e8eaed]">Privacy</a>
                <a href="#" class="hover:text-[#e8eaed]">Terms</a>
            </div>
        </div>

    </div>

    <script>
        async function submitLogin() {
            const email = document.getElementById('email');
            const pass = document.getElementById('password');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let isValid = true;

            if (!emailRegex.test(email.value.trim())) {
                showError(email, 'error-email');
                isValid = false;
            } else hideError(email, 'error-email');

            if (!pass.value.trim()) {
                showError(pass, 'error-password');
                isValid = false;
            } else hideError(pass, 'error-password');

            if (isValid) {
                const loginData = {
                    email: email.value.trim(),
                    password: pass.value
                };


                try {
                    const response = await fetch('/user/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(loginData)
                    });

                    const result = await response.json();

                    if (response.ok) {
                        alert("Login successful!");
                        // You can redirect to home/dashboard here
                        // window.location.href = '/';
                    } else {
                        alert(result.message || "Login failed");
                    }
                } catch (err) {
                    alert("Something went wrong. Please try again.");
                }
            }

        }

        function showError(input, errorId) {
            input.classList.add('error');
            document.getElementById(errorId).classList.remove('hidden');
        }

        function hideError(input, errorId) {
            input.classList.remove('error');
            document.getElementById(errorId).classList.add('hidden');
        }
    </script>
</body>
</html>
