services:
  postgresdb:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: OneAuth
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
  redis:
    image: valkey/valkey:8-alpine
    ports:
      - '6379:6379'

volumes:
  postgres_data: